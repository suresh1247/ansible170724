---
# Role: ad_ou_management
# Purpose: Create OU hierarchy with proper status tracking

- name: OU | Create LKM OU
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $BaseDN = "{{ ou_base_dn }}"
    $LKM = Get-ADOrganizationalUnit -Filter "Name -eq 'LKM'" -ErrorAction SilentlyContinue
    if (-not $LKM) {
        New-ADOrganizationalUnit -Name "LKM" -Path $BaseDN -Description "LKM Root OU for server management"
        Write-Output "CREATED"
    } else {
        Write-Output "EXISTS"
    }
  when: not enable_dry_run
  register: lkm_ou_status

- name: OU | Create Servers OU
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $BaseDN = "{{ ou_base_dn }}"
    $Servers = Get-ADOrganizationalUnit -Filter "Name -eq 'Servers'" -SearchBase "OU=LKM,$BaseDN" -ErrorAction SilentlyContinue
    if (-not $Servers) {
        New-ADOrganizationalUnit -Name "Servers" -Path "OU=LKM,$BaseDN" -Description "Container for all server OUs"
        Write-Output "CREATED"
    } else {
        Write-Output "EXISTS"
    }
  when: not enable_dry_run
  register: servers_ou_status

- name: OU | Create SQL OU if needed
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $BaseDN = "{{ ou_base_dn }}"
    if ("{{ server_type }}" -eq "SQL") {
        $SQL = Get-ADOrganizationalUnit -Filter "Name -eq 'SQL'" -SearchBase "OU=Servers,OU=LKM,$BaseDN" -ErrorAction SilentlyContinue
        if (-not $SQL) {
            New-ADOrganizationalUnit -Name "SQL" -Path "OU=Servers,OU=LKM,$BaseDN" -Description "Container for SQL server OUs"
            Write-Output "CREATED"
        } else {
            Write-Output "EXISTS"
        }
    } else {
        Write-Output "SKIPPED"
    }
  when: server_type == "SQL" and not enable_dry_run
  register: sql_ou_status

- name: OU | Check and Create Application OU
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $BaseDN = "{{ ou_base_dn }}"
    $App = Get-ADOrganizationalUnit -Filter "Name -eq '{{ application_name }}'" -ErrorAction SilentlyContinue
    if ($App) {
        Write-Output "EXISTS"
    } else {
        $ParentPath = if ("{{ server_type }}" -eq "SQL") {
            "OU=SQL,OU=Servers,OU=LKM,$BaseDN"
        } else {
            "OU=Servers,OU=LKM,$BaseDN"
        }
        New-ADOrganizationalUnit -Name "{{ application_name }}" -Path $ParentPath -Description "OU for {{ application_name }} application servers"
        Write-Output "CREATED"
    }
  when: not enable_dry_run
  register: app_ou_status

- name: OU | Wait for OU replication if created
  ansible.windows.win_shell: Start-Sleep -Seconds 3
  when: 
    - not enable_dry_run
    - app_ou_status.stdout is defined
    - app_ou_status.stdout == "CREATED"

- name: OU | Set facts for OU status
  ansible.builtin.set_fact:
    lkm_ou_result: "{{ lkm_ou_status.stdout | default('EXISTS') }}"
    servers_ou_result: "{{ servers_ou_status.stdout | default('EXISTS') }}"
    sql_ou_result: "{{ sql_ou_status.stdout | default('SKIPPED') }}"
    app_ou_result: "{{ app_ou_status.stdout | default('EXISTS') }}"

- name: OU | Display OU creation status
  ansible.builtin.debug:
    msg:
      - "LKM OU: {{ lkm_ou_result }}"
      - "Servers OU: {{ servers_ou_result }}"
      - "SQL OU: {{ sql_ou_result }}"
      - "Application OU: {{ app_ou_result }}"
  when: not enable_dry_run
