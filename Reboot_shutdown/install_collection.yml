---
- name: Install Azure and Active Directory Collections on AAP
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    collection_install_path: "{{ lookup('env', 'ANSIBLE_COLLECTIONS_PATH') | default('/usr/share/ansible/collections', true) }}"
    requirements_file: "collections/requirements.yml"

  tasks:
    - name: Ensure requirements file exists
      ansible.builtin.stat:
        path: "{{ requirements_file }}"
      register: req_file

    - name: Fail if requirements file not found
      ansible.builtin.fail:
        msg: "Requirements file not found at {{ requirements_file }}"
      when: not req_file.stat.exists

    - name: Install collections from requirements file
      ansible.builtin.command:
        cmd: ansible-galaxy collection install -r {{ requirements_file }} -p {{ collection_install_path }} --force-with-deps
      register: install_result
      changed_when: "'already installed' not in install_result.stdout"
      failed_when: install_result.rc != 0

    - name: Display installation output
      ansible.builtin.debug:
        var: install_result.stdout_lines

    - name: Install Python dependencies for Azure collection
      ansible.builtin.pip:
        requirements: "{{ collection_install_path }}/ansible_collections/azure/azcollection/requirements-azure.txt"
        state: present
      when: "'azure.azcollection' in install_result.stdout"
      failed_when: false

    - name: Get collection list in simple text format
      ansible.builtin.shell:
        cmd: ansible-galaxy collection list | grep -E '^[a-z]' | awk '{print $1, $2}'
      register: collection_list_text
      changed_when: false

    - name: "==================== COLLECTION INSTALLATION SUMMARY ===================="
      ansible.builtin.debug:
        msg: |
          ════════════════════════════════════════════════════════
          COLLECTIONS INSTALLED ON AAP SERVER
          ════════════════════════════════════════════════════════
          {{ collection_list_text.stdout }}
          ════════════════════════════════════════════════════════
          Installation completed successfully!
