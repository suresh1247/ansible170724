---
- name: ENTERPRISE ACTIVE DIRECTORY ONBOARDING
  hosts: domain_controllers
  gather_facts: yes
  gather_subset:
    - min
  
  vars:
    # ============================================
    # SERVICE NOW PARAMETERS (Passed from AAP)
    # ============================================
    server_name: "{{ server_name | mandatory }}"
    application_name: "{{ application_name | mandatory }}"
    domain_name: "{{ domain_name | mandatory }}"
    requester_confirmation: "{{ requester_confirmation | mandatory }}"
    
    # ============================================
    # AZURE KEY VAULT CONFIGURATION
    # ============================================
    kv_vault_url: "https://YOUR_VAULT_NAME.vault.azure.net/"
    kv_secret_ad_username: "ad-username"
    kv_secret_ad_password: "ad-password"
    kv_secret_opsintel_username: "opsintel-username"
    kv_secret_opsintel_password: "opsintel-password"
    
    # Azure Authentication - Option 1: Use AAP Azure Key Vault Credential
    # These will be automatically injected if using AAP credential type
    az_client_id: "{{ lookup('env', 'AZURE_CLIENT_ID') | default('') }}"
    az_client_secret: "{{ lookup('env', 'AZURE_CLIENT_SECRET') | default('') }}"
    az_tenant_id: "{{ lookup('env', 'AZURE_TENANT_ID') | default('') }}"
    
    # Option 2: Use Managed Identity (if running on Azure VM)
    use_azure_msi: "{{ lookup('env', 'AZURE_USE_MSI') | default('false') | bool }}"
    
    # ============================================
    # RETRIEVE CREDENTIALS FROM AZURE KEY VAULT
    # ============================================
    # Using Azure Key Vault lookup plugin
    ad_username: >-
      {% if use_azure_msi %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_ad_username, vault_url=kv_vault_url, use_msi=true) }}
      {% else %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_ad_username, vault_url=kv_vault_url, client_id=az_client_id, secret=az_client_secret, tenant_id=az_tenant_id, use_msi=false) }}
      {% endif %}
    
    ad_password: >-
      {% if use_azure_msi %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_ad_password, vault_url=kv_vault_url, use_msi=true) }}
      {% else %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_ad_password, vault_url=kv_vault_url, client_id=az_client_id, secret=az_client_secret, tenant_id=az_tenant_id, use_msi=false) }}
      {% endif %}
    
    opsintel_username: >-
      {% if use_azure_msi %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_opsintel_username, vault_url=kv_vault_url, use_msi=true) }}
      {% else %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_opsintel_username, vault_url=kv_vault_url, client_id=az_client_id, secret=az_client_secret, tenant_id=az_tenant_id, use_msi=false) }}
      {% endif %}
    
    opsintel_password: >-
      {% if use_azure_msi %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_opsintel_password, vault_url=kv_vault_url, use_msi=true) }}
      {% else %}
        {{ lookup('azure.azcollection.azure_keyvault_secret', kv_secret_opsintel_password, vault_url=kv_vault_url, client_id=az_client_id, secret=az_client_secret, tenant_id=az_tenant_id, use_msi=false) }}
      {% endif %}
    
    # ============================================
    # ENTERPRISE SETTINGS
    # ============================================
    enable_dry_run: "{{ enable_dry_run | default(false) | bool }}"
    ad_retries: "{{ ad_retries | default(3) }}"
    ad_delay: "{{ ad_delay | default(5) }}"
    
    # Operation tracking
    operation_id: "{{ lookup('password', '/dev/null length=12 chars=hex') | upper }}"
    operation_start_time: "{{ ansible_date_time.epoch }}"
    environment: "{{ lookup('env', 'ANSIBLE_ENVIRONMENT') | default('production') }}"
    
    # ============================================
    # VALIDATION PATTERNS
    # ============================================
    server_name_pattern: '^[A-Za-z][A-Za-z0-9-]{2,14}$'
    app_name_pattern: '^[A-Za-z][A-Za-z0-9_]{2,30}$'
    domain_name_pattern: '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'
    
    # ============================================
    # AD CONFIGURATION
    # ============================================
    ou_base_dn: "DC={{ domain_name.replace('.', ',DC=') }}"
    
    # Connection settings using Azure Key Vault credentials
    ansible_user: "{{ ad_username }}"
    ansible_password: "{{ ad_password }}"
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_port: 5985
    ansible_winrm_operation_timeout_sec: 60
    ansible_winrm_read_timeout_sec: 120
    
    # Become settings for privilege escalation
    ansible_become: true
    ansible_become_method: runas
    ansible_become_user: SYSTEM
    
    # ============================================
    # DEFAULT VALUES FOR REPORTING
    # ============================================
    ou_creation: { stdout: "EXISTS" }
    group_creation: { stdout: "EXISTS" }
    opsintel_add: { stdout: "ALREADY_MEMBER" }
    gpo_creation: { stdout: "EXISTS" }
    gpo_link: { stdout: "ALREADY_LINKED" }
    restricted_group_config: { stdout: "CONFIGURED" }
    gpupdate_result: { stdout: "INITIATED" }
    server_move: { stdout: "NOT_MOVED" }
    verify_restricted_group: { stdout: "VERIFIED" }

  # ============================================
  # PRE_TASKS: VALIDATION AND SERVER CHECK
  # ============================================
  pre_tasks:
    - name: VALIDATION | Validate required parameters from ServiceNow
      ansible.builtin.assert:
        that:
          - server_name is defined and server_name | length > 0
          - application_name is defined and application_name | length > 0
          - domain_name is defined and domain_name | length > 0
          - requester_confirmation is defined
        fail_msg: "Missing required parameters from ServiceNow"
        success_msg: "✓ All required parameters received from ServiceNow"

    - name: VALIDATION | Validate server name format
      ansible.builtin.assert:
        that:
          - server_name is match(server_name_pattern)
          - server_name | length >= 3
          - server_name | length <= 15
        fail_msg: "Invalid server name '{{ server_name }}'"
        success_msg: "✓ Server name validation passed"

    - name: VALIDATION | Validate application name format
      ansible.builtin.assert:
        that:
          - application_name is match(app_name_pattern)
          - application_name | length >= 3
          - application_name | length <= 30
        fail_msg: "Invalid application name '{{ application_name }}'"
        success_msg: "✓ Application name validation passed"

    - name: VALIDATION | Validate domain name format
      ansible.builtin.assert:
        that:
          - domain_name is match(domain_name_pattern)
        fail_msg: "Invalid domain name format: {{ domain_name }}"
        success_msg: "✓ Domain name validation passed"

    - name: VALIDATION | Validate confirmation flag
      ansible.builtin.assert:
        that:
          - requester_confirmation | upper in ['YES', 'NO']
        fail_msg: "Requester confirmation must be YES or NO"
        success_msg: "✓ Confirmation flag validation passed"

    - name: VALIDATION | Debug credential source
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "CREDENTIAL SOURCE: Azure Key Vault"
          - "=========================================="
          - "Vault URL: {{ kv_vault_url }}"
          - "Username Secret: {{ kv_secret_ad_username }}"
          - "Password Secret: {{ kv_secret_ad_password }}"
          - "Using Managed Identity: {{ use_azure_msi }}"
          - "Username retrieved: {{ ad_username }}"
          - "=========================================="

    - name: VALIDATION | Check for dry run mode
      ansible.builtin.debug:
        msg: "⚠️ DRY RUN MODE ENABLED - No changes will be made to Active Directory"
      when: enable_dry_run | bool

    - name: CONNECTION | Test connectivity to domain controller
      ansible.windows.win_ping:
      register: ping_test
      until: ping_test is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"

    - name: CONNECTION | Display connection information
      ansible.builtin.debug:
        msg:
          - "Connected to: {{ ansible_hostname }}"
          - "IP Address: {{ ansible_default_ipv4.address | default('N/A') }}"
          - "OS: {{ ansible_os_name }}"
          - "Domain: {{ ansible_domain | default('N/A') }}"

    - name: CONNECTION | Verify Active Directory module
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction Stop
        $DomainInfo = Get-ADDomain
        Write-Output "SUCCESS|Domain:$($DomainInfo.DNSRoot)|Controllers:$($DomainInfo.ReplicaDirectoryServers.Count)"
      register: ad_verify
      until: ad_verify is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"

    - name: CONNECTION | Parse AD information
      ansible.builtin.set_fact:
        domain_fqdn: "{{ ad_verify.stdout.split('|')[1].split(':')[1] }}"
        dc_count: "{{ ad_verify.stdout.split('|')[2].split(':')[1] }}"

    - name: CONNECTION | Display AD information
      ansible.builtin.debug:
        msg:
          - "AD Domain: {{ domain_fqdn }}"
          - "Domain Controllers: {{ dc_count }}"

    # ============================================
    # CRITICAL: Check Server Existence FIRST
    # ============================================
    - name: SERVER | Search for server in Active Directory
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction SilentlyContinue
        $Computer = Get-ADComputer -Filter "Name -eq '{{ server_name }}'" `
            -Properties DistinguishedName, Enabled, LastLogonDate, OperatingSystem, Created, Modified, CanonicalName `
            -ErrorAction SilentlyContinue
        if ($Computer) {
            $Result = @{
                Exists = $true
                DN = $Computer.DistinguishedName
                Enabled = $Computer.Enabled
                LastLogon = if ($Computer.LastLogonDate) { $Computer.LastLogonDate.ToString("yyyy-MM-dd HH:mm:ss") } else { "Never" }
                OS = $Computer.OperatingSystem
                Created = $Computer.Created.ToString("yyyy-MM-dd HH:mm:ss")
                Modified = $Computer.Modified.ToString("yyyy-MM-dd HH:mm:ss")
                CanonicalName = $Computer.CanonicalName
            }
            $Result | ConvertTo-Json
        } else {
            '{"Exists": false}'
        }
      register: server_search

    - name: SERVER | Parse server information
      ansible.builtin.set_fact:
        server_info: "{{ server_search.stdout | from_json }}"
        server_exists: "{{ (server_search.stdout | from_json).Exists | default(false) }}"

    - name: SERVER | Display server status
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "SERVER STATUS CHECK"
          - "=========================================="
          - "Server Name: {{ server_name }}"
          - "Exists in AD: {{ 'YES' if server_exists else 'NO' }}"
          - "Current Location: {{ server_info.CanonicalName | default('N/A') }}"
          - "Status: {{ 'Enabled' if server_info.Enabled else 'Disabled' if server_exists else 'N/A' }}"
          - "Created: {{ server_info.Created | default('N/A') }}"
          - "Last Logon: {{ server_info.LastLogon | default('N/A') }}"
          - "=========================================="

    # ============================================
    # STOP PLAYBOOK IF SERVER DOES NOT EXIST
    # ============================================
    - name: SERVER | Stop playbook - Server not found in AD
      ansible.builtin.fail:
        msg: |
          ==========================================
          ❌ OPERATION STOPPED ❌
          ==========================================
          Server '{{ server_name }}' was NOT found in Active Directory.
          
          No OUs, GPOs, or Groups will be created.
          
          Please verify:
          1. The server name is correct
          2. The server is joined to the domain
          3. The server exists in Active Directory
          
          Request from ServiceNow for server: {{ server_name }}
          Application: {{ application_name }}
          Domain: {{ domain_name }}
          ==========================================
      when: 
        - not server_exists
        - requester_confirmation | upper == 'NO'

    - name: SERVER | Continue message when server not found but confirmation is YES
      ansible.builtin.debug:
        msg: "⚠️ Server {{ server_name }} not found in AD but confirmation is YES. Creating OU and GPO only."
      when: 
        - not server_exists
        - requester_confirmation | upper == 'YES'

    - name: SERVER | Set server type and target OU (only if server exists)
      ansible.builtin.set_fact:
        server_type: "{{ 'SQL' if 'SQL' in server_name | upper else 'NON-SQL' }}"
        target_ou_dn: >-
          {{
            ('OU=' + application_name + ',OU=SQL,OU=Servers,OU=LKM,' + ou_base_dn)
            if ('SQL' in server_name | upper)
            else ('OU=' + application_name + ',OU=Servers,OU=LKM,' + ou_base_dn)
          }}
        app_prefix: "{{ application_name[:3] | upper }}"
        ad_group_name: "{{ application_name[:3] | upper }}-PAM-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
        gpo_name: "{{ application_name[:3] | upper }}-SRV-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
      when: server_exists

  # ============================================
  # MAIN TASKS: AD ONBOARDING
  # ============================================
  tasks:
    - name: MAIN | Execute AD onboarding (Only if server exists)
      block:
        - name: Include validation role
          ansible.builtin.include_role:
            name: ad_validation
          when: server_exists and not enable_dry_run | bool

        - name: Include OU management role
          ansible.builtin.include_role:
            name: ad_ou_management
          when: server_exists and not enable_dry_run | bool

        - name: Include computer management role
          ansible.builtin.include_role:
            name: ad_computer_management
          when: server_exists and not enable_dry_run | bool

        - name: Include group management role
          ansible.builtin.include_role:
            name: ad_group_management
          when: server_exists and not enable_dry_run | bool

        - name: Include GPO management role
          ansible.builtin.include_role:
            name: ad_gpo_management
          when: server_exists and not enable_dry_run | bool

        - name: Include restricted groups role
          ansible.builtin.include_role:
            name: ad_restricted_groups
          when: server_exists and not enable_dry_run | bool

        - name: Include reporting role
          ansible.builtin.include_role:
            name: ad_reporting
          when: server_exists

      when: server_exists

  # ============================================
  # POST_TASKS: FINAL SUMMARY
  # ============================================
  post_tasks:
    - name: REPORT | Server not found - Final summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "❌ AD ONBOARDING CANCELLED"
          - "=========================================="
          - "Operation ID: {{ operation_id }}"
          - "Server: {{ server_name }}"
          - "Application: {{ application_name }}"
          - "Domain: {{ domain_name }}"
          - "Status: FAILED - Server Not Found in Active Directory"
          - ""
          - "No changes were made to Active Directory."
          - "No OUs, GPOs, or Groups were created."
          - ""
          - "Please verify the server name and try again."
          - "ServiceNow Request ID: {{ servicenow_request_id | default('N/A') }}"
          - "=========================================="
      when: not server_exists

    - name: REPORT | Success - Final summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "✅ AD ONBOARDING COMPLETED SUCCESSFULLY"
          - "=========================================="
          - "Operation ID: {{ operation_id }}"
          - "Environment: {{ environment }}"
          - "Duration: {{ (ansible_date_time.epoch | int - operation_start_time | int) }} seconds"
          - ""
          - "ServiceNow Details:"
          - "  Server: {{ server_name }}"
          - "  Application: {{ application_name }}"
          - "  Domain: {{ domain_name }}"
          - "  Confirmation: {{ requester_confirmation }}"
          - "  Request ID: {{ servicenow_request_id | default('N/A') }}"
          - ""
          - "Azure Key Vault:"
          - "  Vault URL: {{ kv_vault_url }}"
          - "  Username Secret: {{ kv_secret_ad_username }}"
          - "  Using Managed Identity: {{ use_azure_msi }}"
          - ""
          - "AD Changes:"
          - "  OU Created: {{ 'YES' if app_ou_result is defined and app_ou_result == 'CREATED' else 'NO' }}"
          - "  Server Moved: {{ 'YES' if server_move.stdout is defined and 'MOVED_SUCCESSFULLY' in server_move.stdout else 'NO' }}"
          - "  PAM Group: {{ ad_group_name }}"
          - "  GPO: {{ gpo_name }}"
          - "  Restricted Groups: Administrators with {{ domain_name }}\\opsintel"
          - "=========================================="
      when: server_exists
