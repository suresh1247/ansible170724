---
- name: ENTERPRISE ACTIVE DIRECTORY ONBOARDING
  hosts: domain_controllers
  gather_facts: yes
  gather_subset:
    - min

  vars:
    # Azure Key Vault configuration
    azure_vault_url: "https://ansible-aap-kv.vault.azure.net"

  pre_tasks:
    # ============================================
    # Azure Key Vault Integration (Alternative Method)
    # ============================================
    - name: AZURE | Retrieve secrets from Azure Key Vault
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "{{ azure_vault_url }}"
        name: "ad-username"
      register: ad_username_secret
      when: enable_dry_run is not defined

    - name: AZURE | Set AD username
      ansible.builtin.set_fact:
        ad_username: "{{ ad_username_secret.secrets[0].value }}"
      when: ad_username_secret is defined

    - name: AZURE | Retrieve AD password
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "{{ azure_vault_url }}"
        name: "ad-password"
      register: ad_password_secret

    - name: AZURE | Set AD password
      ansible.builtin.set_fact:
        ad_password: "{{ ad_password_secret.secrets[0].value }}"
      when: ad_password_secret is defined

    - name: AZURE | Retrieve opsintel username
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "{{ azure_vault_url }}"
        name: "opsintel-username"
      register: opsintel_username_secret

    - name: AZURE | Set opsintel username
      ansible.builtin.set_fact:
        opsintel_username: "{{ opsintel_username_secret.secrets[0].value }}"
      when: opsintel_username_secret is defined
