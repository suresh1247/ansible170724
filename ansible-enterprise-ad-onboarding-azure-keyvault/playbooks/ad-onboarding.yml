---
# This play runs locally to retrieve credentials from Azure Key Vault
- name: RETRIEVE CREDENTIALS FROM AZURE KEY VAULT
  hosts: localhost
  connection: local
  gather_facts: no
  
  tasks:
    # ============================================
    # AZURE KEY VAULT: Using azure.azcollection
    # ============================================
    - name: AZURE | Validate Azure credentials from AAP credential
      ansible.builtin.assert:
        that:
          - azure_client_id is defined
          - azure_client_secret is defined
          - azure_tenant_id is defined
          - azure_subscription_id is defined
          - azure_keyvault_name is defined
        fail_msg: |
          ==========================================
          ❌ AZURE CREDENTIALS MISSING ❌
          ==========================================
          Please ensure the 'Azure Service Principal' 
          credential is attached to this job template.
          
          Required fields:
          - azure_client_id
          - azure_client_secret
          - azure_tenant_id
          - azure_subscription_id
          - azure_keyvault_name
          ==========================================
        success_msg: "✓ Azure credentials validated"

    - name: AZURE | Display Azure credentials status (debug only)
      ansible.builtin.debug:
        msg:
          - "Azure Client ID: {{ azure_client_id[:4] }}****"
          - "Azure Tenant ID: {{ azure_tenant_id[:4] }}****"
          - "Azure Key Vault: {{ azure_keyvault_name }}"
      when: not enable_dry_run | bool

    - name: AZURE | Set Azure authentication facts
      ansible.builtin.set_fact:
        azure_auth:
          subscription_id: "{{ azure_subscription_id }}"
          client_id: "{{ azure_client_id }}"
          secret: "{{ azure_client_secret }}"
          tenant: "{{ azure_tenant_id }}"
      no_log: true

    - name: AZURE | Retrieve AD username from Key Vault
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ azure_keyvault_name }}.vault.azure.net/"
        name: "ad-username"
        subscription_id: "{{ azure_subscription_id }}"
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_client_secret }}"
        tenant: "{{ azure_tenant_id }}"
      register: kv_username_result
      no_log: true
      failed_when: false

    - name: AZURE | Retrieve AD password from Key Vault
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ azure_keyvault_name }}.vault.azure.net/"
        name: "ad-password"
        subscription_id: "{{ azure_subscription_id }}"
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_client_secret }}"
        tenant: "{{ azure_tenant_id }}"
      register: kv_password_result
      no_log: true
      failed_when: false

    - name: AZURE | Retrieve AD domain from Key Vault
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ azure_keyvault_name }}.vault.azure.net/"
        name: "ad-domain"
        subscription_id: "{{ azure_subscription_id }}"
        client_id: "{{ azure_client_id }}"
        secret: "{{ azure_client_secret }}"
        tenant: "{{ azure_tenant_id }}"
      register: kv_domain_result
      no_log: true
      failed_when: false

    - name: AZURE | Check Key Vault secrets retrieval status
      ansible.builtin.fail:
        msg: |
          ==========================================
          ❌ AZURE KEY VAULT SECRET RETRIEVAL FAILED ❌
          ==========================================
          Failed to retrieve secret: ad-username
          
          Error: {{ kv_username_result.msg if kv_username_result.msg else 'Unknown error' }}
          
          Please verify:
          1. Secret 'ad-username' exists in Key Vault
          2. Service Principal has 'get' permission for secrets
          3. Key Vault name is correct
          ==========================================
      when: kv_username_result.failed | default(false)

    - name: AZURE | Check Key Vault secrets retrieval status - Password
      ansible.builtin.fail:
        msg: |
          ==========================================
          ❌ AZURE KEY VAULT SECRET RETRIEVAL FAILED ❌
          ==========================================
          Failed to retrieve secret: ad-password
          
          Error: {{ kv_password_result.msg if kv_password_result.msg else 'Unknown error' }}
          
          Please verify:
          1. Secret 'ad-password' exists in Key Vault
          2. Service Principal has 'get' permission for secrets
          3. Key Vault name is correct
          ==========================================
      when: kv_password_result.failed | default(false)

    - name: AZURE | Check Key Vault secrets retrieval status - Domain
      ansible.builtin.fail:
        msg: |
          ==========================================
          ❌ AZURE KEY VAULT SECRET RETRIEVAL FAILED ❌
          ==========================================
          Failed to retrieve secret: ad-domain
          
          Error: {{ kv_domain_result.msg if kv_domain_result.msg else 'Unknown error' }}
          
          Please verify:
          1. Secret 'ad-domain' exists in Key Vault
          2. Service Principal has 'get' permission for secrets
          3. Key Vault name is correct
          ==========================================
      when: kv_domain_result.failed | default(false)

    - name: AZURE | Set credentials from Key Vault
      ansible.builtin.set_fact:
        ad_username: "{{ kv_username_result.secrets[0].value }}"
        ad_password: "{{ kv_password_result.secrets[0].value }}"
        domain_name: "{{ kv_domain_result.secrets[0].value }}"
        ansible_user: "{{ kv_username_result.secrets[0].value }}"
        ansible_password: "{{ kv_password_result.secrets[0].value }}"
      no_log: false
      when: 
        - not kv_username_result.failed | default(false)
        - not kv_password_result.failed | default(false)
        - not kv_domain_result.failed | default(false)

    - name: AZURE | Debug credentials status
      ansible.builtin.debug:
        msg:
          - "✓ Azure Key Vault '{{ azure_keyvault_name }}' connected successfully"
          - "✓ AD Username: {{ ad_username }}"
          - "✓ AD Domain: {{ domain_name }}"
      when: 
        - ad_username is defined
        - ad_password is defined
        - domain_name is defined

    - name: AZURE | Create credential file for use in next play
      ansible.builtin.copy:
        content: |
          ansible_user: {{ ad_username }}
          ansible_password: {{ ad_password }}
          domain_name: {{ domain_name }}
          ad_username: {{ ad_username }}
          ad_password: {{ ad_password }}
        dest: "/tmp/ad_credentials.yml"
        mode: '0600'
      run_once: true

# ============================================
# Main AD Onboarding Play
# ============================================
- name: ENTERPRISE ACTIVE DIRECTORY ONBOARDING WITH AZURE KEY VAULT
  hosts: domain_controllers
  gather_facts: yes
  gather_subset:
    - min
  
  become: true
  become_method: runas
  become_user: SYSTEM
  
  vars_files:
    - /tmp/ad_credentials.yml
  
  vars:
    # Enterprise settings
    enable_dry_run: false
    ad_retries: 3
    ad_delay: 5
    
    # Operation tracking
    operation_id: "{{ lookup('password', '/dev/null length=12 chars=hex') | upper }}"
    operation_start_time: "{{ ansible_date_time.epoch }}"
    
    # Validation patterns
    server_name_pattern: '^[A-Za-z][A-Za-z0-9-]{2,14}$'
    app_name_pattern: '^[A-Za-z][A-Za-z0-9_]{2,30}$'
    domain_name_pattern: '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'
    
    # Base OU path
    ou_base_dn: "DC={{ domain_name.replace('.', ',DC=') }}"
    
    # Connection settings
    ansible_user: "{{ ansible_user }}"
    ansible_password: "{{ ansible_password }}"
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_port: 5985
    ansible_winrm_operation_timeout_sec: 60
    ansible_winrm_read_timeout_sec: 120

  pre_tasks:
    - name: CONNECTION | Test connectivity to domain controller
      ansible.windows.win_ping:
      register: ping_test
      until: ping_test is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"

    - name: CONNECTION | Verify Active Directory module
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction Stop
        Get-ADDomain | Select-Object DNSRoot
      register: ad_verify
      until: ad_verify is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"
      no_log: true

    - name: PRE-TASKS | Set server type and target OU
      ansible.builtin.set_fact:
        server_type: "{{ 'SQL' if 'SQL' in server_name | upper else 'NON-SQL' }}"
        target_ou_dn: >-
          {{
            ('OU=' + application_name + ',OU=SQL,OU=Servers,OU=LKM,' + ou_base_dn)
            if ('SQL' in server_name | upper)
            else ('OU=' + application_name + ',OU=Servers,OU=LKM,' + ou_base_dn)
          }}
        app_prefix: "{{ application_name[:3] | upper }}"
        ad_group_name: "{{ application_name[:3] | upper }}-PAM-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
        gpo_name: "{{ application_name[:3] | upper }}-SRV-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
      when: server_name is defined

  tasks:
    - name: MAIN | Execute AD onboarding
      block:
        - name: Include validation role
          ansible.builtin.include_role:
            name: ad_validation

        - name: Include computer management - Check Only
          ansible.builtin.include_role:
            name: ad_computer_management
            tasks_from: check_server

        - name: Include OU management role
          ansible.builtin.include_role:
            name: ad_ou_management

        - name: Include computer management - Move Server
          ansible.builtin.include_role:
            name: ad_computer_management
            tasks_from: move_server

        - name: Include group management role
          ansible.builtin.include_role:
            name: ad_group_management

        - name: Include GPO management role
          ansible.builtin.include_role:
            name: ad_gpo_management

        - name: Include restricted groups role
          ansible.builtin.include_role:
            name: ad_restricted_groups

        - name: Include reporting role
          ansible.builtin.include_role:
            name: ad_reporting

      rescue:
        - name: ERROR | Display failure
          ansible.builtin.debug:
            msg: "❌ AD ONBOARDING FAILED for {{ server_name }}"

        - name: ERROR | Re-raise failure
          ansible.builtin.fail:
            msg: "AD Onboarding failed for {{ server_name }}"

  post_tasks:
    - name: CLEANUP | Remove temporary credentials file
      ansible.builtin.file:
        path: "/tmp/ad_credentials.yml"
        state: absent
      delegate_to: localhost
      run_once: true
      when: not enable_dry_run | bool