---
# This play runs locally to retrieve credentials from Azure Key Vault
- name: RETRIEVE CREDENTIALS FROM AZURE KEY VAULT
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    # Enterprise settings
    enable_dry_run: false
    azure_keyvault_name: "{{ azure_keyvault_name }}"
  
  tasks:
    # ============================================
    # AZURE KEY VAULT: Login and get secrets
    # ============================================
    - name: AZURE | Validate Azure credentials from AAP credential
      ansible.builtin.assert:
        that:
          - azure_client_id is defined
          - azure_client_secret is defined
          - azure_tenant_id is defined
          - azure_subscription_id is defined
          - azure_keyvault_name is defined
        fail_msg: |
          ==========================================
          ❌ AZURE CREDENTIALS MISSING ❌
          ==========================================
          Please ensure the 'Azure Service Principal' 
          credential is attached to this job template.
          
          Required fields:
          - azure_client_id
          - azure_client_secret
          - azure_tenant_id
          - azure_subscription_id
          - azure_keyvault_name
          ==========================================
        success_msg: "✓ Azure credentials validated"

    - name: AZURE | Login to Azure using Service Principal
      ansible.builtin.shell: |
        az login --service-principal \
          --username "{{ azure_client_id }}" \
          --password "{{ azure_client_secret }}" \
          --tenant "{{ azure_tenant_id }}" \
          --only-show-errors
      run_once: true
      no_log: true

    - name: AZURE | Set subscription
      ansible.builtin.shell: |
        az account set --subscription "{{ azure_subscription_id }}"
      run_once: true
      no_log: true

    - name: AZURE | Retrieve AD credentials from Key Vault
      ansible.builtin.shell: |
        az keyvault secret show \
          --vault-name "{{ azure_keyvault_name }}" \
          --name "{{ item }}" \
          --query value \
          -o tsv
      loop:
        - "ad-username"
        - "ad-password"
        - "ad-domain"
      register: kv_secrets
      no_log: true
      run_once: true

    - name: AZURE | Set credentials from Key Vault as facts
      ansible.builtin.set_fact:
        ad_username: "{{ kv_secrets.results[0].stdout }}"
        ad_password: "{{ kv_secrets.results[1].stdout }}"
        domain_name: "{{ kv_secrets.results[2].stdout }}"
      no_log: true

    - name: AZURE | Create credential file for use in next play
      ansible.builtin.copy:
        content: |
          ansible_user: {{ kv_secrets.results[0].stdout }}
          ansible_password: {{ kv_secrets.results[1].stdout }}
          domain_name: {{ kv_secrets.results[2].stdout }}
          ad_username: {{ kv_secrets.results[0].stdout }}
          ad_password: {{ kv_secrets.results[1].stdout }}
        dest: "/tmp/ad_credentials.yml"
      run_once: true

    - name: AZURE | Debug Azure Key Vault connection status
      ansible.builtin.debug:
        msg: "✓ Azure Key Vault '{{ azure_keyvault_name }}' connected successfully"

# ============================================
# Main AD Onboarding Play
# ============================================
- name: ENTERPRISE ACTIVE DIRECTORY ONBOARDING WITH AZURE KEY VAULT
  hosts: domain_controllers
  gather_facts: yes
  gather_subset:
    - min
  
  become: true
  become_method: runas
  become_user: SYSTEM
  
  vars_files:
    - /tmp/ad_credentials.yml
  
  vars:
    # Enterprise settings
    enable_dry_run: false
    ad_retries: 3
    ad_delay: 5
    
    # Operation tracking
    operation_id: "{{ lookup('password', '/dev/null length=12 chars=hex') | upper }}"
    operation_start_time: "{{ ansible_date_time.epoch }}"
    
    # Validation patterns
    server_name_pattern: '^[A-Za-z][A-Za-z0-9-]{2,14}$'
    app_name_pattern: '^[A-Za-z][A-Za-z0-9_]{2,30}$'
    domain_name_pattern: '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'
    
    # Base OU path
    ou_base_dn: "DC={{ domain_name.replace('.', ',DC=') }}"
    
    # Connection settings
    ansible_user: "{{ ansible_user }}"
    ansible_password: "{{ ansible_password }}"
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_port: 5985
    ansible_winrm_operation_timeout_sec: 60
    ansible_winrm_read_timeout_sec: 120

  pre_tasks:
    - name: CONNECTION | Test connectivity to domain controller
      ansible.windows.win_ping:
      register: ping_test
      until: ping_test is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"

    - name: CONNECTION | Verify Active Directory module
      ansible.windows.win_shell: |
        Import-Module ActiveDirectory -ErrorAction Stop
        Get-ADDomain | Select-Object DNSRoot
      register: ad_verify
      until: ad_verify is success
      retries: "{{ ad_retries }}"
      delay: "{{ ad_delay }}"
      no_log: true

    - name: PRE-TASKS | Set server type and target OU
      ansible.builtin.set_fact:
        server_type: "{{ 'SQL' if 'SQL' in server_name | upper else 'NON-SQL' }}"
        target_ou_dn: >-
          {{
            ('OU=' + application_name + ',OU=SQL,OU=Servers,OU=LKM,' + ou_base_dn)
            if ('SQL' in server_name | upper)
            else ('OU=' + application_name + ',OU=Servers,OU=LKM,' + ou_base_dn)
          }}
        app_prefix: "{{ application_name[:3] | upper }}"
        ad_group_name: "{{ application_name[:3] | upper }}-PAM-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
        gpo_name: "{{ application_name[:3] | upper }}-SRV-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
      when: server_name is defined

  tasks:
    - name: MAIN | Execute AD onboarding
      block:
        - name: Include validation role
          ansible.builtin.include_role:
            name: ad_validation

        - name: Include computer management - Check Only
          ansible.builtin.include_role:
            name: ad_computer_management
            tasks_from: check_server

        - name: Include OU management role
          ansible.builtin.include_role:
            name: ad_ou_management

        - name: Include computer management - Move Server
          ansible.builtin.include_role:
            name: ad_computer_management
            tasks_from: move_server

        - name: Include group management role
          ansible.builtin.include_role:
            name: ad_group_management

        - name: Include GPO management role
          ansible.builtin.include_role:
            name: ad_gpo_management

        - name: Include restricted groups role
          ansible.builtin.include_role:
            name: ad_restricted_groups

        - name: Include reporting role
          ansible.builtin.include_role:
            name: ad_reporting

      rescue:
        - name: ERROR | Display failure
          ansible.builtin.debug:
            msg: "❌ AD ONBOARDING FAILED for {{ server_name }}"

        - name: ERROR | Re-raise failure
          ansible.builtin.fail:
            msg: "AD Onboarding failed for {{ server_name }}"

  post_tasks:
    - name: CLEANUP | Remove temporary credentials file
      ansible.builtin.file:
        path: "/tmp/ad_credentials.yml"
        state: absent
      delegate_to: localhost
      run_once: true
      when: not enable_dry_run | bool