---
# Role: ad_ou_management
# Purpose: Create OU hierarchy using microsoft.ad.ou module

- name: OU | Ensure LKM OU exists
  microsoft.ad.ou:
    name: LKM
    path: "{{ ou_base_dn }}"
    description: "LKM Root OU for server management"
    state: present
  run_once: true
  register: lkm_ou_result
  when: not enable_dry_run | bool

- name: OU | Ensure Servers OU exists
  microsoft.ad.ou:
    name: Servers
    path: "OU=LKM,{{ ou_base_dn }}"
    description: "Container for all server OUs"
    state: present
  run_once: true
  register: servers_ou_result
  when: not enable_dry_run | bool

- name: OU | Ensure SQL OU exists if needed
  microsoft.ad.ou:
    name: SQL
    path: "OU=Servers,OU=LKM,{{ ou_base_dn }}"
    description: "Container for SQL server OUs"
    state: present
  run_once: true
  register: sql_ou_result
  when: server_type is defined and server_type == "SQL" and not enable_dry_run | bool

- name: OU | Ensure Application OU exists
  microsoft.ad.ou:
    name: "{{ application_name }}"
    path: "{{ 'OU=SQL,OU=Servers,OU=LKM' if server_type is defined and server_type == 'SQL' else 'OU=Servers,OU=LKM' }},{{ ou_base_dn }}"
    description: "OU for {{ application_name }} application servers"
    state: present
  run_once: true
  register: app_ou_result
  when: not enable_dry_run | bool