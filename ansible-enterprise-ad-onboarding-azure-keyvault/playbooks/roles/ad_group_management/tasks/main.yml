---
# Role: ad_group_management
# Purpose: Create PAM security groups using microsoft.ad modules

- name: GROUP | Ensure PAM Groups OU exists
  microsoft.ad.ou:
    name: PAM-Groups
    path: "{{ ou_base_dn }}"
    description: "Container for all PAM security groups"
    state: present
  run_once: true
  register: pam_ou_result
  when: not enable_dry_run | bool

- name: GROUP | Ensure PAM security group exists
  microsoft.ad.group:
    name: "{{ ad_group_name }}"
    path: "OU=PAM-Groups,{{ ou_base_dn }}"
    scope: global
    category: security
    description: "PAM group for {{ application_name }} ({{ server_type }} server)"
    state: present
  run_once: true
  register: group_result
  when: not enable_dry_run | bool

- name: GROUP | Ensure opsintel user is member of PAM group
  microsoft.ad.group_membership:
    group_name: "{{ ad_group_name }}"
    members:
      - opsintel
    state: present
  run_once: true
  register: opsintel_result
  when: not enable_dry_run | bool