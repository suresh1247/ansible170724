---
# Role: ad_group_management
# Purpose: Create PAM security groups using microsoft.ad modules with win_shell fallback

- name: GROUP | Ensure PAM Groups OU exists
  microsoft.ad.ou:
    name: PAM-Groups
    path: "{{ ou_base_dn }}"
    description: "Container for all PAM security groups"
    state: present
  run_once: true
  register: pam_ou_result
  when: not enable_dry_run | bool

- name: GROUP | Ensure PAM security group exists
  microsoft.ad.group:
    name: "{{ ad_group_name }}"
    path: "OU=PAM-Groups,{{ ou_base_dn }}"
    scope: global
    category: security
    description: "PAM group for {{ application_name }} ({{ server_type }} server)"
    state: present
  run_once: true
  register: group_result
  when: not enable_dry_run | bool

- name: GROUP | Add opsintel user to PAM group using win_shell
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $GroupName = "{{ ad_group_name }}"
    $UserName = "opsintel"
    
    # Check if user exists
    $UserExists = Get-ADUser -Filter "SamAccountName -eq '$UserName'" -ErrorAction SilentlyContinue
    if (-not $UserExists) {
        Write-Output "USER_NOT_FOUND"
        exit 0
    }
    
    # Check if user is already a member
    $IsMember = Get-ADGroupMember -Identity $GroupName -ErrorAction SilentlyContinue | Where-Object { $_.SamAccountName -eq $UserName }
    if ($IsMember) {
        Write-Output "ALREADY_MEMBER"
    } else {
        Add-ADGroupMember -Identity $GroupName -Members $UserName
        Write-Output "ADDED"
    }
  run_once: true
  register: opsintel_result
  when: not enable_dry_run | bool
  changed_when: opsintel_result.stdout == "ADDED"