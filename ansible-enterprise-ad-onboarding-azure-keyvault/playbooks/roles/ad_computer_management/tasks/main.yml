---
# Role: ad_computer_management
# Purpose: Search, validate, and move computer objects using microsoft.ad modules

- name: SERVER | Search for server in Active Directory
  microsoft.ad.computer:
    identity: "{{ server_name }}"
    state: query
  register: computer_info_result
  failed_when: false

- name: SERVER | Debug computer query result
  ansible.builtin.debug:
    var: computer_info_result
  when: not enable_dry_run | bool

- name: SERVER | Parse server information
  ansible.builtin.set_fact:
    server_exists: "{{ computer_info_result.objects | length > 0 if computer_info_result.objects is defined else false }}"
    server_dn: "{{ computer_info_result.objects[0].DistinguishedName if computer_info_result.objects is defined and computer_info_result.objects | length > 0 else '' }}"
    server_canonical: "{{ computer_info_result.objects[0].CanonicalName if computer_info_result.objects is defined and computer_info_result.objects | length > 0 else '' }}"
    server_enabled: "{{ computer_info_result.objects[0].Enabled if computer_info_result.objects is defined and computer_info_result.objects | length > 0 else false }}"
  no_log: false

- name: SERVER | Display server status
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "SERVER STATUS CHECK"
      - "=========================================="
      - "Server Name: {{ server_name }}"
      - "Exists in AD: {{ 'YES' if server_exists else 'NO' }}"
      - "Current Location: {{ server_canonical | default('N/A') }}"
      - "Status: {{ 'Enabled' if server_enabled else 'Disabled' if server_exists else 'N/A' }}"
      - "=========================================="

- name: SERVER | Stop playbook when server is not found in AD
  ansible.builtin.fail:
    msg: |
      ==========================================
      ❌ SERVER NOT FOUND ❌
      ==========================================
      Server '{{ server_name }}' was not found in Active Directory.
      
      No OUs, GPOs, or Groups were created.
      
      Please verify:
      1. The server name is correct
      2. The server is joined to the domain
      3. The server exists in Active Directory
      ==========================================
  when: not server_exists | bool

- name: COMPUTER | Verify target OU exists before moving
  microsoft.ad.ou:
    name: "{{ application_name }}"
    state: query
  register: ou_info_result
  failed_when: false
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Debug OU query result
  ansible.builtin.debug:
    var: ou_info_result
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Fail if target OU does not exist
  ansible.builtin.fail:
    msg: "Target OU '{{ target_ou_dn }}' does not exist. Please ensure OU is created before moving server."
  when: 
    - server_exists and not enable_dry_run | bool
    - ou_info_result.objects is defined and ou_info_result.objects | length == 0

- name: COMPUTER | Move server to target OU
  microsoft.ad.computer:
    identity: "{{ server_name }}"
    organizational_unit: "{{ target_ou_dn }}"
    state: present
  run_once: true
  register: server_move_result
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Debug move result
  ansible.builtin.debug:
    var: server_move_result
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Set server move fact for reporting
  ansible.builtin.set_fact:
    server_moved: "{{ server_move_result.changed | default(false) }}"
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Verify server move
  microsoft.ad.computer:
    identity: "{{ server_name }}"
    state: query
  register: verify_move_result
  when: server_exists and not enable_dry_run | bool and server_move_result.changed | default(false)

- name: COMPUTER | Display verification result
  ansible.builtin.debug:
    msg: "Server moved successfully to: {{ verify_move_result.objects[0].CanonicalName if verify_move_result.objects is defined and verify_move_result.objects | length > 0 else 'Unknown' }}"
  when: server_exists and not enable_dry_run | bool and server_move_result.changed | default(false)