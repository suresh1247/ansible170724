---
# Role: ad_computer_management
# Purpose: Search, validate, and move computer objects using win_shell with case-insensitive search

- name: SERVER | Search for server in Active Directory (Case-insensitive)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction SilentlyContinue
    
    # Search with case-insensitive comparison
    $Computer = Get-ADComputer -Filter "Name -eq '{{ server_name }}'" -Properties DistinguishedName, CanonicalName, Enabled -ErrorAction SilentlyContinue
    
    # If not found with exact match, try wildcard search (case-insensitive)
    if (-not $Computer) {
        $Computer = Get-ADComputer -Filter "Name -like '{{ server_name }}'" -Properties DistinguishedName, CanonicalName, Enabled -ErrorAction SilentlyContinue
    }
    
    if ($Computer) {
        $Result = @{
            Exists = $true
            DN = $Computer.DistinguishedName
            CanonicalName = $Computer.CanonicalName
            Enabled = $Computer.Enabled
        }
        $Result | ConvertTo-Json
    } else {
        '{"Exists": false}'
    }
  register: server_search
  no_log: false
  changed_when: false

- name: SERVER | Debug server search result
  ansible.builtin.debug:
    var: server_search
  when: not enable_dry_run | bool

- name: SERVER | Parse server information
  ansible.builtin.set_fact:
    server_info: "{{ server_search.stdout | from_json }}"
    server_exists: "{{ (server_search.stdout | from_json).Exists | default(false) }}"
    server_canonical: "{{ (server_search.stdout | from_json).CanonicalName | default('N/A') }}"
    server_enabled: "{{ (server_search.stdout | from_json).Enabled | default(false) }}"
  no_log: false

- name: SERVER | Display server status
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "SERVER STATUS CHECK"
      - "=========================================="
      - "Server Name: {{ server_name }}"
      - "Exists in AD: {{ 'YES' if server_exists else 'NO' }}"
      - "Current Location: {{ server_canonical | default('N/A') }}"
      - "Status: {{ 'Enabled' if server_enabled else 'Disabled' if server_exists else 'N/A' }}"
      - "=========================================="

- name: SERVER | Stop playbook when server is not found in AD
  ansible.builtin.fail:
    msg: |
      ==========================================
      ❌ SERVER NOT FOUND ❌
      ==========================================
      Server '{{ server_name }}' was not found in Active Directory.
      
      No OUs, GPOs, or Groups were created.
      
      Please verify:
      1. The server name is correct
      2. The server is joined to the domain
      3. The server exists in Active Directory
      ==========================================
  when: not server_exists | bool

- name: SERVER | Set server type and target OU
  ansible.builtin.set_fact:
    server_type: "{{ 'SQL' if 'SQL' in server_name | upper else 'NON-SQL' }}"
    target_ou_dn: >-
      {{
        ('OU=' + application_name + ',OU=SQL,OU=Servers,OU=LKM,' + ou_base_dn)
        if ('SQL' in server_name | upper)
        else ('OU=' + application_name + ',OU=Servers,OU=LKM,' + ou_base_dn)
      }}
    app_prefix: "{{ application_name[:3] | upper }}"
    ad_group_name: "{{ application_name[:3] | upper }}-PAM-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
    gpo_name: "{{ application_name[:3] | upper }}-SRV-{{ application_name }}{{ 'SQL' if ('SQL' in server_name | upper) else '' }}"
  when: server_exists | bool

- name: COMPUTER | Get current server location
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $Computer = Get-ADComputer -Identity "{{ server_name }}" -Properties DistinguishedName
    $CurrentParent = ($Computer.DistinguishedName -split ',', 2)[1]
    Write-Output "CURRENT_PARENT:$CurrentParent"
  run_once: true
  register: current_location
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Display current vs target location
  ansible.builtin.debug:
    msg:
      - "Current OU: {{ current_location.stdout.split(':',1)[1] }}"
      - "Target OU: {{ target_ou_dn }}"
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Move server to target OU
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $TargetOU = "{{ target_ou_dn }}"
    $Computer = Get-ADComputer -Identity "{{ server_name }}" -Properties DistinguishedName
    $CurrentParent = ($Computer.DistinguishedName -split ',', 2)[1]
    
    if ($CurrentParent -eq $TargetOU) {
        Write-Output "ALREADY_IN_CORRECT_OU"
    } else {
        Move-ADObject -Identity $Computer.DistinguishedName -TargetPath $TargetOU -Confirm:$false
        Write-Output "MOVED_SUCCESSFULLY"
    }
  run_once: true
  register: server_move
  when: server_exists and not enable_dry_run | bool
  changed_when: server_move.stdout == "MOVED_SUCCESSFULLY"

- name: COMPUTER | Set server move fact for reporting
  ansible.builtin.set_fact:
    server_moved: "{{ server_move.stdout == 'MOVED_SUCCESSFULLY' }}"
  when: server_exists and not enable_dry_run | bool

- name: COMPUTER | Verify server move
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory -ErrorAction Stop
    $Computer = Get-ADComputer -Identity "{{ server_name }}" -Properties DistinguishedName, CanonicalName
    $CurrentParent = ($Computer.DistinguishedName -split ',', 2)[1]
    $CanonicalName = $Computer.CanonicalName
    Write-Output "VERIFIED|Current Parent: $CurrentParent|Canonical: $CanonicalName"
  run_once: true
  register: verify_move
  when: server_exists and not enable_dry_run | bool and server_move.stdout == "MOVED_SUCCESSFULLY"

- name: COMPUTER | Display verification result
  ansible.builtin.debug:
    msg: "Server moved successfully to: {{ verify_move.stdout }}"
  when: server_exists and not enable_dry_run | bool and server_move.stdout == "MOVED_SUCCESSFULLY"