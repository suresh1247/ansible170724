---
# Role: ad_reporting
# Purpose: Generate final summary report

- name: REPORT | Calculate operation duration
  ansible.builtin.set_fact:
    operation_duration: "{{ (ansible_date_time.epoch | int - operation_start_time | int) if operation_start_time is defined else 0 }}"

- name: REPORT | Final Status Report
  ansible.builtin.debug:
    msg:
      - "=========================================="
      - "✅ ACTIVE DIRECTORY ONBOARDING COMPLETED"
      - "=========================================="
      - "Operation ID: {{ operation_id | default('N/A') }}"
      - "Duration: {{ operation_duration | default(0) }} seconds"
      - "Dry Run: {{ 'YES' if enable_dry_run else 'NO' }}"
      - ""
      - "Server Details:"
      - "  Server Name: {{ server_name | default('N/A') }}"
      - "  Domain: {{ domain_name | default('N/A') }}"
      - "  Application: {{ application_name | default('N/A') }}"
      - "  Server Type: {{ server_type | default('NON-SQL') }}"
      - "  Target OU: {{ target_ou_dn | default('N/A') }}"
      - ""
      - "OU Status:"
      - "  LKM OU: {{ 'CREATED' if lkm_ou_result.stdout == 'CREATED' else 'EXISTS' }}"
      - "  Servers OU: {{ 'CREATED' if servers_ou_result.stdout == 'CREATED' else 'EXISTS' }}"
      - "  SQL OU: {{ 'CREATED' if sql_ou_result.stdout == 'CREATED' else 'EXISTS' if server_type == 'SQL' else 'SKIPPED' }}"
      - "  Application OU: {{ 'CREATED' if app_ou_result.stdout == 'CREATED' else 'EXISTS' }}"
      - "  PAM Groups OU: {{ 'CREATED' if pam_ou_result.stdout == 'CREATED' else 'EXISTS' }}"
      - ""
      - "Server Status:"
      - "  Server in AD: {{ 'YES' if server_exists else 'NO' }}"
      - "  Server Moved: {{ 'YES' if server_move.stdout == 'MOVED' else 'NO' }}"
      - "  Confirmation Provided: {{ requester_confirmation | upper }}"
      - ""
      - "Security Configuration:"
      - "  PAM Group: {{ ad_group_name | default('N/A') }}"
      - "  PAM Group Status: {{ 'CREATED' if group_result.stdout == 'CREATED' else 'EXISTS' }}"
      - "  opsintel User: {{ opsintel_result.stdout | default('N/A') }}"
      - "  Restricted Group: Administrators"
      - "  Restricted Group Member: {{ ad_group_name | default('N/A') }} (PAM Group)"
      - "  Restricted Group Status: {{ rg_result.stdout | default('CONFIGURED') }}"
      - "  Verification: {{ verify_result.stdout | default('VERIFIED') }}"
      - ""
      - "GPO Status:"
      - "  GPO Name: {{ gpo_name | default('N/A') }}"
      - "  GPO Status: {{ 'CREATED' if gpo_result.stdout == 'CREATED' else 'EXISTS' }}"
      - "  GPO Link: {{ 'LINKED' if gpo_link_result.stdout == 'LINKED' else 'ALREADY_LINKED' }}"
      - "  GPO Backup: {{ gpo_backup.stdout | default('N/A') }}"
      - "  GPO Refresh: {{ gpupdate_result.stdout | default('N/A') }}"
      - ""
      - "=========================================="

- name: REPORT | Fail if server not found
  ansible.builtin.fail:
    msg: "Server '{{ server_name }}' not found in Active Directory. Onboarding stopped."
  when: 
    - not server_exists | default(false)
    - requester_confirmation | upper == 'NO'
