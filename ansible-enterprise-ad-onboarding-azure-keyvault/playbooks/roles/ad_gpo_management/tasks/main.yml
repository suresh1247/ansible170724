---
# Role: ad_gpo_management
# Purpose: Create and link GPO using community.windows modules

- name: GPO | Ensure GPO exists
  community.windows.gpo:
    name: "{{ gpo_name }}"
    state: present
    description: "GPO for {{ application_name }} ({{ server_type }} server)"
  run_once: true
  register: gpo_result
  when: not enable_dry_run | bool

- name: GPO | Link GPO to Application OU
  community.windows.gpo_link:
    name: "{{ gpo_name }}"
    target: "{{ target_ou_dn }}"
    enabled: yes
  run_once: true
  register: gpo_link_result
  when: not enable_dry_run | bool