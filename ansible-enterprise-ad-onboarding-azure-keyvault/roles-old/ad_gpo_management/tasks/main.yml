---
# Role: ad_gpo_management
# Purpose: Create and link GPO

- name: GPO | Set GPO name
  ansible.builtin.set_fact:
    gpo_name: >-
      {{
        (app_prefix + '-SRV-' + application_name + 'SQL')
        if server_type == 'SQL'
        else (app_prefix + '-SRV-' + application_name)
      }}

- name: GPO | Display GPO name
  ansible.builtin.debug:
    msg: "Managing GPO: {{ gpo_name }}"

- name: GPO | Check if GPO exists
  ansible.windows.win_shell: |
    Import-Module GroupPolicy -ErrorAction Stop
    $GPOName = "{{ gpo_name }}"
    $ExistingGPO = Get-GPO -Name $GPOName -ErrorAction SilentlyContinue
    if ($ExistingGPO) {
        Write-Output "EXISTS"
    } else {
        Write-Output "NOT_FOUND"
    }
  when: not enable_dry_run
  register: gpo_check

- name: GPO | Create GPO if not exists
  ansible.windows.win_shell: |
    Import-Module GroupPolicy -ErrorAction Stop
    $GPOName = "{{ gpo_name }}"
    New-GPO -Name $GPOName -Comment "GPO for {{ application_name }} ({{ server_type }} server)"
    Write-Output "CREATED"
  when: gpo_check.stdout == "NOT_FOUND" and not enable_dry_run
  register: gpo_creation

- name: GPO | Set GPO creation status based on actual state
  ansible.builtin.set_fact:
    gpo_result: "{{ 'CREATED' if gpo_creation is defined and gpo_creation.stdout == 'CREATED' else 'EXISTS' }}"

- name: GPO | Link GPO to Application OU
  ansible.windows.win_shell: |
    Import-Module GroupPolicy -ErrorAction Stop
    $GPOName = "{{ gpo_name }}"
    $TargetOU = "{{ target_ou_dn }}"
    
    $CurrentLinks = Get-GPInheritance -Target $TargetOU -ErrorAction SilentlyContinue
    $AlreadyLinked = $CurrentLinks.GpoLinks | Where-Object { $_.DisplayName -eq $GPOName }
    
    if (-not $AlreadyLinked) {
        New-GPLink -Name $GPOName -Target $TargetOU -LinkEnabled Yes
        Write-Output "LINKED"
    } else {
        Write-Output "ALREADY_LINKED"
    }
  when: not enable_dry_run
  register: gpo_link

- name: GPO | Set GPO link status
  ansible.builtin.set_fact:
    gpo_link_result: "{{ gpo_link.stdout | default('ALREADY_LINKED') }}"
