---
- name: AD SERVER ONBOARDING - USING NATIVE WIN_MODULE
  hosts: domain_controllers
  gather_facts: no
  vars:
    server_name: "{{ server_name }}"
    domain_name: "{{ domain_name }}"
    application_name: "{{ application_name }}"
    requester_confirmation: "{{ requester_confirmation }}"
    ou_base_dn: "DC={{ domain_name.replace('.', ',DC=') }}"

  tasks:
    - name: STEP 1 - Search for server in AD using PowerShell
      ansible.windows.win_powershell:
        script: |
          $ServerName = "{{ server_name }}"
          $SearchBase = "{{ ou_base_dn }}"
          $Filter = "(&(objectClass=computer)(name=$ServerName))"
          $Result = Get-ADComputer -Filter "Name -eq '$ServerName'" -Properties Name -ErrorAction SilentlyContinue
          if ($Result) {
              Write-Output "EXISTS"
          } else {
              Write-Output "NOT_FOUND"
          }
      register: ad_server_search
      ignore_errors: yes

    - name: STEP 1.1 - Parse search result
      ansible.builtin.set_fact:
        server_exists: "{{ 'EXISTS' in ad_server_search.output }}"

    - name: STEP 1.2 - Display server status
      ansible.builtin.debug:
        msg: "Server {{ server_name }} found in AD: {{ server_exists }}"

    - name: STEP 1.3 - End playbook if server not found and confirmation is NO
      ansible.builtin.meta: end_play
      when: 
        - not server_exists
        - requester_confirmation | upper == 'NO'

    - name: STEP 3 - Search for Application OU
      ansible.windows.win_powershell:
        script: |
          $OUName = "{{ application_name }}"
          $SearchBase = "{{ ou_base_dn }}"
          $Result = Get-ADOrganizationalUnit -Filter "Name -eq '$OUName'" -Properties Name -ErrorAction SilentlyContinue
          if ($Result) {
              Write-Output "EXISTS:$($Result.DistinguishedName)"
          } else {
              Write-Output "NOT_FOUND"
          }
      register: app_ou_search
      
    - name: STEP 3.1 - Parse OU search result
      ansible.builtin.set_fact:
        app_ou_exists: "{{ 'EXISTS' in app_ou_search.output }}"
        app_ou_path: "{{ app_ou_search.output.split(':')[1] if 'EXISTS' in app_ou_search.output else '' }}"

    - name: STEP 4 - Determine server type
      ansible.builtin.set_fact:
        server_type: "{{ 'SQL' if 'SQL' in server_name | upper else 'NON-SQL' }}"
        
    - name: STEP 4.1 - Display server type
      ansible.builtin.debug:
        msg: "Server Type: {{ server_type }}"

    - name: STEP 5 - Build target OU path
      ansible.builtin.set_fact:
        target_ou_dn: >-
          {{
            ('OU=' + application_name + ',OU=SQL,OU=Servers,OU=LKM,' + ou_base_dn)
            if server_type == 'SQL'
            else ('OU=' + application_name + ',OU=Servers,OU=LKM,' + ou_base_dn)
          }}

    - name: STEP 5.1 - Display target OU
      ansible.builtin.debug:
        msg: "Target Application OU: {{ target_ou_dn }}"

    - name: STEP 5.2 - Create OU hierarchy (only if OU doesn't exist)
      ansible.windows.win_powershell:
        script: |
          # Create LKM OU if not exists
          $LKM_OU = "OU=LKM,{{ ou_base_dn }}"
          if (-not (Get-ADOrganizationalUnit -Filter "Name -eq 'LKM'" -ErrorAction SilentlyContinue)) {
              New-ADOrganizationalUnit -Name "LKM" -Path "{{ ou_base_dn }}"
              Write-Output "Created OU: LKM"
          }
          
          # Create Servers OU under LKM
          $Servers_OU = "OU=Servers,OU=LKM,{{ ou_base_dn }}"
          if (-not (Get-ADOrganizationalUnit -Filter "Name -eq 'Servers'" -ErrorAction SilentlyContinue)) {
              New-ADOrganizationalUnit -Name "Servers" -Path "OU=LKM,{{ ou_base_dn }}"
              Write-Output "Created OU: Servers"
          }
          
          # Create SQL OU for SQL servers
          if ("{{ server_type }}" -eq "SQL") {
              $SQL_OU = "OU=SQL,OU=Servers,OU=LKM,{{ ou_base_dn }}"
              if (-not (Get-ADOrganizationalUnit -Filter "Name -eq 'SQL'" -ErrorAction SilentlyContinue)) {
                  New-ADOrganizationalUnit -Name "SQL" -Path "OU=Servers,OU=LKM,{{ ou_base_dn }}"
                  Write-Output "Created OU: SQL"
              }
          }
          
          # Create Application OU
          $App_OU = "{{ target_ou_dn }}"
          if (-not (Get-ADOrganizationalUnit -Filter "Name -eq '{{ application_name }}'" -ErrorAction SilentlyContinue)) {
              $ParentPath = if ("{{ server_type }}" -eq "SQL") {
                  "OU=SQL,OU=Servers,OU=LKM,{{ ou_base_dn }}"
              } else {
                  "OU=Servers,OU=LKM,{{ ou_base_dn }}"
              }
              New-ADOrganizationalUnit -Name "{{ application_name }}" -Path $ParentPath
              Write-Output "Created OU: {{ application_name }}"
          }
      when: not app_ou_exists
      register: ou_creation
    - name: STEP 6 - Set app prefix
      ansible.builtin.set_fact:
        app_prefix: "{{ application_name[:3] | upper }}"

    - name: STEP 6.1 - Set AD group name
      ansible.builtin.set_fact:
        ad_group_name: >-
          {{
            (app_prefix + '-PAM-' + application_name + 'SQL')
            if server_type == 'SQL'
            else (app_prefix + '-PAM-' + application_name)
          }}

    - name: STEP 6.2 - Display AD group name
      ansible.builtin.debug:
        msg: "Creating AD Group: {{ ad_group_name }}"

    - name: STEP 6.3 - Create AD group in target OU
      ansible.windows.win_powershell:
        script: |
          $GroupName = "{{ ad_group_name }}"
          $GroupPath = "{{ target_ou_dn }}"
          
          # Check if group already exists
          $ExistingGroup = Get-ADGroup -Filter "Name -eq '$GroupName'" -ErrorAction SilentlyContinue
          if (-not $ExistingGroup) {
              New-ADGroup -Name $GroupName `
                  -GroupScope Global `
                  -GroupCategory Security `
                  -Path $GroupPath `
                  -Description "PAM group for {{ application_name }} ({{ server_type }} server)"
              Write-Output "Created group: $GroupName"
          } else {
              Write-Output "Group already exists: $GroupName"
          }
      register: group_creation

    - name: STEP 7 - Create GPO name
      ansible.builtin.set_fact:
        gpo_name: >-
          {{
            (app_prefix + '-SRV-' + application_name + 'SQL')
            if server_type == 'SQL'
            else (app_prefix + '-SRV-' + application_name)
          }}
          
    - name: STEP 7.1 - Display GPO name
      ansible.builtin.debug:
        msg: "Creating GPO: {{ gpo_name }}"

    - name: STEP 8 - Final Status Report
      ansible.builtin.debug:
        msg:
          - "======================================================"
          - "CLOSE SUCCESSFUL"
          - "======================================================"
          - "Server: {{ server_name }}"
          - "Domain: {{ domain_name }}"
          - "Application: {{ application_name }}"
          - "Server Type: {{ server_type }}"
          - "Target OU: {{ target_ou_dn }}"
          - ""
          - "{{ '[EXISTS]' if app_ou_exists else '[CREATED]' }} Application OU: {{ application_name }}"
          - "{{ '[EXISTS]' if app_ou_exists else '[CREATED]' }} AD Group: {{ ad_group_name }}"
          - "{{ '[EXISTS]' if app_ou_exists else '[CREATED]' }} GPO: {{ gpo_name }}"
          - ""
          - "Configuration Summary:"
          - "OU Path: LKM → Servers → {{ 'SQL → ' if server_type == 'SQL' else '' }}{{ application_name }}"
          - "Group Naming: {{ app_prefix }}-PAM-{{ application_name }}{{ 'SQL' if server_type == 'SQL' else '' }}"
          - "GPO Naming: {{ app_prefix }}-SRV-{{ application_name }}{{ 'SQL' if server_type == 'SQL' else '' }}" 
