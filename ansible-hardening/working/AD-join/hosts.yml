all:
  hosts:
    winserver1:
      ansible_host: 10.0.3.11  
      ansible_user: adminuser
      ansible_password: "ctrls@1234$#$"
      ansible_connection: winrm
      ansible_winrm_transport: ntlm
      ansible_winrm_server_cert_validation: ignore
      ansible_winrm_scheme: http
      ansible_port: 5985

  vars:
    # Domain Configuration
    domain_dns_name: "nat.net"
    domain_netbios_name: "ANSIBLE"
    domain_ou_path: "OU=Computers,DC=nat,DC=net"
    domain_controller_ip: "10.0.3.6"  # Your DC IP address
    
    # Domain Admin Credentials
    domain_admin_user: "adminuser@{{ domain_dns_name }}"
    # These should be encrypted with ansible-vault
    domain_admin_password: "{{ vault_domain_admin_password }}"
    windows_local_admin_password: "{{ vault_windows_local_admin_password }}"
