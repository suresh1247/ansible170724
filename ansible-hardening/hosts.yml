---
all:
  hosts:
    # Windows Servers
    winserver1:
      ansible_host: 10.0.3.11
      ansible_user: adminuser
      ansible_password: "{{ windows_local_admin_password }}"
      ansible_connection: winrm
      ansible_winrm_transport: ntlm
      ansible_winrm_server_cert_validation: ignore
      ansible_winrm_scheme: http
      ansible_port: 5985
      ansible_shell_type: powershell
      os_type: windows


    # Linux Servers
    linuxserver1:
      ansible_host: 10.0.3.7
      ansible_user: adminuser
      ansible_password: "{{ linux_root_password }}"
      ansible_connection: ssh
      ansible_shell_type: sh
      os_type: linux
      linux_distribution: ubuntu  # or rhel/centos

    linuxserver2:
      ansible_host: 10.0.3.10
      ansible_user: adminuser
      ansible_password: "{{ linux_root_password }}"
      ansible_connection: ssh
      ansible_shell_type: sh
      os_type: linux
      linux_distribution: rhel

  vars:
    # Domain Configuration
    domain_name: "nat.net"
    domain_realm: "NAT.NET"
    domain_netbios: "NAT"
    domain_controller_ip: "10.0.3.6"
    domain_admin_user: "adminuser@nat.net"
    domain_ou_path: "OU=Computers,DC=nat,DC=net"
    
    # Linux specific
    linux_domain_join_ou: "OU=Linux,OU=Computers,DC=nat,DC=net"
    windows_domain_join_ou: "OU=Windows,OU=Computers,DC=nat,DC=net"
    
    # Auto-detection
    force_reboot: true
