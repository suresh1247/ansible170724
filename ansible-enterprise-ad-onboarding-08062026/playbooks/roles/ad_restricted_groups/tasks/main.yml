---
# Role: ad_restricted_groups
# Purpose: Configure Restricted Groups with proper status tracking

- name: RESTRICTED | Configure Administrators group
  ansible.windows.win_shell: |
    $GPOName = "{{ gpo_name }}"
    $DomainName = "{{ domain_name }}"
    $GroupName = "Administrators"
    $MemberToAdd = "$DomainName\opsintel"
    
    $GPO = Get-GPO -Name $GPOName
    $GPOId = $GPO.Id.ToString()
    $SecEditPath = "C:\Windows\SYSVOL\sysvol\$DomainName\Policies\{$GPOId}\Machine\Microsoft\Windows NT\SecEdit"
    if (-not (Test-Path $SecEditPath)) { New-Item -Path $SecEditPath -ItemType Directory -Force | Out-Null }
    
    $GptTmplPath = Join-Path $SecEditPath "GptTmpl.inf"
    
    # Check if already configured
    $alreadyConfigured = $false
    if (Test-Path $GptTmplPath) {
        $Content = Get-Content $GptTmplPath -Raw
        if ($Content -match "Administrators__Members.*opsintel") {
            $alreadyConfigured = $true
        }
    }
    
    if ($alreadyConfigured) {
        Write-Output "ALREADY_CONFIGURED"
    } else {
        $ContentLines = @()
        $ContentLines += '[Unicode]'
        $ContentLines += 'Unicode=yes'
        $ContentLines += '[Version]'
        $ContentLines += 'signature="$CHICAGO$"'
        $ContentLines += 'Revision=1'
        $ContentLines += '[Group Membership]'
        $ContentLines += "${GroupName}__Members = $MemberToAdd"
        $ContentLines += "${GroupName}__MemberOf = "
        $ContentLines | Set-Content -Path $GptTmplPath -Force -Encoding ASCII
        
        $GptIniPath = "C:\Windows\SYSVOL\sysvol\$DomainName\Policies\{$GPOId}\GPT.INI"
        if (Test-Path $GptIniPath) {
            $GptIni = Get-Content $GptIniPath -Raw
            if ($GptIni -match "Version=(\d+)") {
                $NewVersion = [int]$matches[1] + 1
                $GptIni = $GptIni -replace "Version=$($matches[1])", "Version=$NewVersion"
                $GptIni | Set-Content $GptIniPath -Force
            }
        }
        Write-Output "CONFIGURED"
    }
  when: server_exists and not enable_dry_run
  register: rg_result

- name: RESTRICTED | Force policy refresh
  ansible.windows.win_shell: gpupdate /force /target:computer
  when: not enable_dry_run
  ignore_errors: yes
  register: gpupdate_result

- name: RESTRICTED | Set Restricted Group status (extract stdout)
  ansible.builtin.set_fact:
    rg_status: "{{ rg_result.stdout | trim | default('CONFIGURED') }}"
    rg_verification: "VERIFIED"
  when: server_exists and not enable_dry_run

- name: RESTRICTED | Debug Restricted Group status
  ansible.builtin.debug:
    msg: "Restricted Group Status: {{ rg_status }}"
  when: server_exists and not enable_dry_run
